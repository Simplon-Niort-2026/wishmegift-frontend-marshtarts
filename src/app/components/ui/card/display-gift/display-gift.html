<div class="gift-card">
  <div class="gift-row">
    <span class="gift-label">Nom cadeau</span>
    <span class="gift-value">{{ title }}</span>
  </div>
  <div class="gift-row">
    <span class="gift-label">Lien du cadeau</span>
    <a [href]="link" class="gift-link">{{ link }}</a>
  </div>
  <div class="gift-row">
    <span class="gift-label">Prix cadeau</span>
    <span class="gift-value">{{ price }} €</span>
  </div>
  <div class="gift-row gift-row--actions">
    <span class="gift-label">Niveau d'envie</span>
    <app-display-star [rating]="envy()" />
    <button class="gift-btn">Réserver le cadeau</button>
  </div>
</div>
