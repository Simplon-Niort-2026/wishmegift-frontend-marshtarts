<div class="gift-card">
  <div class="gift-row">
    <span class="gift-label">Nom cadeau</span>
    <input class="gift-input" [value]="title()" (input)="title.set($any($event.target).value)" placeholder="Titre du cadeau" />
  </div>
  <div class="gift-row">
    <span class="gift-label">Lien du cadeau</span>
    <input class="gift-input" [value]="link()" (input)="link.set($any($event.target).value)" placeholder="Lien du cadeau" />
  </div>
  <div class="gift-row">
    <span class="gift-label">Prix cadeau</span>
    <input class="gift-input gift-input--short" type="number" [value]="price()" (input)="price.set(+$any($event.target).value)" placeholder="Prix (€)" />
  </div>
  <div class="gift-row gift-row--actions">
    <span class="gift-label">Niveau d'envie</span>
    <div class="gift-stars">
      <app-stars />
    </div>
  </div>
  <div class="trash-icon">
    <app-icon [icon]="iconTrash" (click)="deleted.emit()" color="787787" size="2x"></app-icon>
  </div>
</div>
